<!DOCTYPE html>
<html>
<head>
  <title>Youth Exit Poll</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    #results {
  list-style: none;
  padding: 0;
  text-align: left;
}

#results li {
  padding: 6px;
  border-bottom: 1px solid #ddd;
  font-size: 16px;
}
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      background: #f2f2f2;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 10px;
    }

    input, select, button {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }

    .party {
      display: flex;
      align-items: center;
      justify-content: left;
      margin: 5px;
    }

    .party img {
      width: 30px;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<div class="card" id="intro">

  <h2>🗳 Youth Exit Poll</h2>

  <!-- 📝 NOTE SECTION -->
  <div style="background:#fff3cd; padding:10px; border-radius:8px; margin-bottom:15px;">
    <b>⚠️ Note:</b>
    <p id="noteText">
      <युथ एक्सिट पोल का भारत सरकार, चुनाव आयोग या किसी भी राज्य सरकार से कोई संबंध नहीं है।>
      
    </p>
  </div>

  <p>Vote dene ke liye mobile number daale</p>

  <input type="text" id="phone" placeholder="Mobile Number">

  <button onclick="enter()">Continue</button>

</div>

<div class="card" id="voteSection" style="display:none;">

  <<h3>Select Party</h3>

<label class="party">
<input type="radio" name="party" value="SP"> <span>SP</span>
</label>

<label class="party">
<input type="radio" name="party" value="BJP"> <span>BJP</span>
</label>

<label class="party">
 <input type="radio" name="party" value="CONGRESS"> <span>CONGRESS</span>
</label>

<label class="party">
<input type="radio" name="party" value="BSP"> <span>BSP</span>
</label>

<label class="party">
<input type="radio" name="party" value="OTHERS"> <span>OTHERS</span>
</label>
  <h3>Gender</h3>
  <select id="gender">
    <option>Male</option>
    <option>Female</option>
  </select>

  <h3>Age</h3>
  <select id="age">
    <option>18-30</option>
    <option>30-50</option>
    <option>50-60</option>
  </select>

  <button onclick="submitVote()">Submit Vote</button>

  <h3>📊 Live Result</h3>
  <div style="height:250px;">
  <canvas id="chart"></canvas>


<script>

const firebaseConfig = {
  apiKey: "AIzaSyBE93JUXeVPwWYmBV8R8hDfOu6iEonvzuQ",
  authDomain: "first-time-7ca0f.firebaseapp.com",
  projectId: "first-time-7ca0f",
  storageBucket: "first-time-7ca0f.firebasestorage.app",
  messagingSenderId: "770041666893",
  appId: "1:770041666893:web:d89380c54aea7143cb6b04",
  measurementId: "G-5PZTG17JW2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let userPhone = "";
let chart;

// enter
function enter(){
  userPhone = document.getElementById("phone").value;

  if(localStorage.getItem("voted")){
    alert("Already voted ❌");
    return;
  }

  document.getElementById("intro").style.display="none";
  document.getElementById("voteSection").style.display="block";
}

// vote
function submitVote(){
  let party = document.querySelector('input[name="party"]:checked');
  let gender = document.getElementById("gender").value;
  let age = document.getElementById("age").value;

  if(!party){
    alert("Select party");
    return;
  }

  db.collection("votes").doc(userPhone).get().then(doc=>{
    if(doc.exists){
      alert("Already voted ❌");
    } else {
      db.collection("votes").doc(userPhone).set({
        party: party.value,
        gender: gender,
        age: age
      });

      localStorage.setItem("voted","yes");
      alert("Vote Submitted ✅");
    }
  });
}


function loadChart(){
  db.collection("votes").onSnapshot(snapshot=>{

    let count = {
      SP:0,
      BJP:0,
      CONGRESS:0,
      BSP:0,
      OTHERS:0
    };

    snapshot.forEach(doc=>{
      let data = doc.data();
      let p = data.party;

      if(count[p] !== undefined){
        count[p]++;
      } else {
        count.OTHERS++;
      }
    });

    // 🔥 TEXT RESULT
    let resultHTML = "";
    for(let party in count){
      resultHTML += `<li>${party} : ${count[party]} votes</li>`;
    }

    document.getElementById("results").innerHTML = resultHTML;

    // 🔥 GRAPH DATA
    let dataArray = [
      count.SP,
      count.BJP,
      count.CONGRESS,
      count.BSP,
       count.OTHERS,
    ]

    let ctx = document.getElementById("chart").getContext("2d");

    if(chart){
      chart.data.datasets[0].data = dataArray;
      chart.update();
    } else {
      chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["SP","BJP","CONGRESS","BSP","OTHERS"],
          datasets: [{
            label: "Votes",
            data: dataArray
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });
    }

  });
}

loadChart();
</script>

</body>
</html>
